appId: com.anonymous.reactnativeuitest
---
- launchApp
- assertVisible: "Welcome back"

# From Login, open the Register screen
- tapOn:
    id: "login-to-register"
- assertVisible: "Create account"
- assertNotVisible: "Explore"

# --- Invalid input: assert each field's error while it is on screen ---
- scrollUntilVisible:
    element:
      id: "register-name-input"
    direction: DOWN
- tapOn:
    id: "register-name-input"
- inputText: "A"
- hideKeyboard
- assertVisible: "Name must be at least 2 characters"

- scrollUntilVisible:
    element:
      id: "register-email-input"
    direction: DOWN
- tapOn:
    id: "register-email-input"
- inputText: "invalid_email"
- hideKeyboard
- assertVisible: "Invalid email format"

- scrollUntilVisible:
    element:
      id: "register-password-input"
    direction: DOWN
- tapOn:
    id: "register-password-input"
- inputText: "short"
- hideKeyboard
- assertVisible:
    id: "register-password-error"

- scrollUntilVisible:
    element:
      id: "register-confirm-password-input"
    direction: DOWN
- tapOn:
    id: "register-confirm-password-input"
- inputText: "different"
- hideKeyboard
- assertVisible: "Passwords do not match"

# --- Correct every field (scroll back to the top of the form first) ---
- scrollUntilVisible:
    element:
      text: "Create account"
    direction: UP

- scrollUntilVisible:
    element:
      id: "register-name-input"
    direction: DOWN
- tapOn:
    id: "register-name-input"
- eraseText: 30
- inputText: "John Doe"
- hideKeyboard

- scrollUntilVisible:
    element:
      id: "register-email-input"
    direction: DOWN
- tapOn:
    id: "register-email-input"
- eraseText: 30
- inputText: "john@example.com"
- hideKeyboard

- scrollUntilVisible:
    element:
      id: "register-password-input"
    direction: DOWN
- tapOn:
    id: "register-password-input"
- eraseText: 30
- inputText: "password1"
- hideKeyboard

- scrollUntilVisible:
    element:
      id: "register-confirm-password-input"
    direction: DOWN
- tapOn:
    id: "register-confirm-password-input"
- eraseText: 30
- inputText: "password1"
- hideKeyboard

# --- Submit a valid form -> lands on Home ---
- scrollUntilVisible:
    element:
      id: "register-submit-button"
    direction: DOWN
- tapOn:
    id: "register-submit-button"
- assertVisible:
    id: "home-screen"
